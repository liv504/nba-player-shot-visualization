<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NBA Shot Chart</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
</head>
<body>

<div class="container" style="display: flex; gap: 20px; padding: 20px;">

  <div class="controls" style="flex: 0 0 250px; display: flex; flex-direction: column; gap: 20px;">
    <h2>Filters</h2>

    <div>
      <label>Player</label><br>
      <input id="player-name" placeholder="LeBron James" style="width: 100%;">
    </div>

    <div>
      <label>Season Start</label><br>
      <input id="season-start" placeholder="2020-21" style="width: 100%;">
    </div>

    <div>
      <label>Season End</label><br>
      <input id="season-end" placeholder="2023-24" style="width: 100%;">
    </div>

    <div>
      <label>Season Type</label><br>
      <select id="season-type" style="width: 100%;">
        <option value="Regular Season">Regular Season</option>
        <option value="Playoffs">Playoffs</option>
      </select>
    </div>

    <div>
      <label>Opponent</label><br>
      <input id="opponent" placeholder="LAL, BOS" style="width: 100%;">
    </div>

    <button id="load" style="margin-top: 10px; padding: 8px;">Load Shot Chart</button>
  </div>

  <div class="court-area" style="flex: 1; display: flex; flex-direction: column; gap: 10px; align-items: center;">
    <svg id="court" width="928" height="500" style="border: 1px solid #ccc;">
      <image xlink:href="/static/nba_court.svg" x="0" y="0" width="928" height="500"></image>
    </svg>

    <div class="legend" style="display: flex; gap: 20px; font-weight: bold;">
      <span style="color:green;">● Made</span>
      <span style="color:red;">● Missed</span>
    </div>
  </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
